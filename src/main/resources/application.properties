# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
# Database
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# SQL initialization (only creates pg_trgm extension, safe to run always)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.jpa.defer-datasource-initialization=true

# JWT — JWT_SECRET must be set as an environment variable (no fallback in production)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=2592000000

# Google OAuth (optional — Google login disabled if not set)
google.client-id=${GOOGLE_CLIENT_ID:}

# Razorpay (optional — payment requires these to be set)
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# OpenAI (optional — AI features require this to be set)
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-1.5-flash
groq.api-key=${GROQ_API_KEY}
groq.model=llama-3.3-70b-versatile

# Plans
plan.free.max-searches=5
plan.pro.price-monthly=69
plan.pro.price-annual=479
plan.premium.price-monthly=149
plan.premium.price-annual=999

# Logging
logging.level.com.indiasalarycoach=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} [%t] %-5level %logger{36} - %msg%n

# Actuator (share the same port as the main server so management.server.port never resolves to null)
management.server.port=${PORT:8080}
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
